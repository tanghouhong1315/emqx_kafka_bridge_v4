## Kafka Bootstrap Servers
## 环境变量：KAFKA_BOOTSTRAP_SERVERS
## 格式：host1:port1,host2:port2
kafka.bridge.bootstrap_servers = 127.0.0.1:9092

## Kafka 生产者配置
kafka.bridge.required_acks = 1
kafka.bridge.max_retries = 3
kafka.bridge.retry_backoff_ms = 500
kafka.bridge.max_batch_bytes = 1048576
kafka.bridge.max_inflight = 10

## 异步发送配置
kafka.bridge.pool_size = 8
kafka.bridge.batch_size = 100
kafka.bridge.batch_timeout_ms = 50

## Kafka 重连间隔 (秒)
kafka.bridge.reconnect_seconds = 10

## HTTP API 监听端口
kafka.bridge.api_port = 8090
